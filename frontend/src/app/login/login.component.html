<div class="login-page">
  <div class="login-card">
    <div class="brand-mark">LH</div>
    <h1>Welcome to Lynx Health</h1>
    <p class="subtitle">Sign in to continue to the healthcare center.</p>

    <!-- SSO: Primary action -->
    <button type="button" class="button sso-button" (click)="loginWithSaml()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Login with Rhodes SSO
    </button>

    <p class="sso-hint">For all students and staff, use your Rhodes credentials.</p>

    <!-- Divider -->
    <div class="divider"><span>or</span></div>

    <!-- Admin Panel -->
    <button type="button" class="guest-toggle-btn" (click)="testAdminLogin()">
      Test Admin Panel
    </button>
    <button type="button" class="guest-toggle-btn" (click)="testUserLogin()">
      Test User Panel
    </button>
  </div>
</div>
